name: Release - Generar Release en Main

on:
  push:
    branches: [ main ]
    paths:
      - 'Cargo.toml'
      - 'src/**'

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

permissions:
  contents: write
  packages: write

jobs:
  create-release:
    name: Create Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: linux
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: windows
          - os: macos-latest
            target: x86_64-apple-darwin
            suffix: macos
    
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      
      - name: Cache cargo build
        uses: actions/cache@v5.0.4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Run tests
        run: cargo test --verbose
      
      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}
      
      - name: Create artifact (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p release
          cp target/${{ matrix.target }}/release/chat ./release/chat-${{ matrix.suffix }}
      
      - name: Create artifact (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          mkdir release
          copy target\${{ matrix.target }}\release\chat.exe .\release\chat-${{ matrix.suffix }}.exe
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v7.0.0
        with:
          name: chat-${{ matrix.suffix }}
          path: release/
  
  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: create-release
    if: success()
    
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      
      - name: Get version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | awk -F '"' '{print $2}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"
      
      - name: Download all artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: artifacts
      
      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          body: |
            ## Chat v${{ steps.version.outputs.version }}
            
            Analizador de rutas con arquitectura hexagonal en Rust.
            
            ### Cambios
            - Automatizado con GitHub Actions
            - Compilado en múltiples plataformas
            
            ### Descargas
            - **Linux**: `chat-linux`
            - **Windows**: `chat-windows.exe`
            - **macOS**: `chat-macos`
          artifacts: "./artifacts/*/*"
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
